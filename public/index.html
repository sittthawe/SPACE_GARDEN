<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SPACE</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page page-home">
    <div class="page-background page-background-home" aria-hidden="true">
      <span class="page-background-veil"></span>
      <span class="page-background-nebula page-background-nebula-1"></span>
      <span class="page-background-nebula page-background-nebula-2"></span>
      <span class="page-background-nebula page-background-nebula-3"></span>
      <span class="page-background-ring page-background-ring-1"></span>
      <span class="page-background-ring page-background-ring-2"></span>
      <span class="page-background-ring page-background-ring-3"></span>
      <span class="page-background-beam page-background-beam-1"></span>
      <span class="page-background-beam page-background-beam-2"></span>
      <span class="page-background-grid"></span>
      <span class="page-background-stars"></span>
    </div>

    <header class="hero-shell site-shell">
      <nav class="site-nav">
        <a class="brand-lockup" href="/">
          <span class="brand" data-brand="SPACE">SPACE</span>
        </a>
        <div class="nav-links">
          <a class="nav-link is-active" href="/">Gallery</a>
          <a class="nav-link" href="/admin">Studio</a>
        </div>
      </nav>

      <section class="hero hero-centered">
        <p class="eyebrow">Curated digital gallery</p>
        <h1 class="hero-title">SPACE</h1>
        <p class="hero-subtitle">
          AI-crafted imagery born from imagination where generative intelligence meets artistic vision. Every piece is an original
          visual creation.
        </p>
        <div class="hero-divider"></div>
      </section>
    </header>

    <main class="site-shell gallery-shell">
      <section class="gallery-status-bar">
        <span class="toolbar-chip" id="photo-count">0 photos live</span>
        <span class="toolbar-chip" id="gallery-sync">Ready to sync</span>
      </section>

      <section class="gallery-grid" id="gallery-grid" aria-live="polite"></section>

      <section class="empty-state" id="empty-state" hidden>
        <div class="empty-state-card empty-state-card-coming-soon">
          <div class="coming-soon-visual" aria-hidden="true">
            <span class="coming-soon-orbit coming-soon-orbit-outer"></span>
            <span class="coming-soon-orbit coming-soon-orbit-middle"></span>
            <span class="coming-soon-orbit coming-soon-orbit-inner"></span>
            <span class="coming-soon-spark coming-soon-spark-1"></span>
            <span class="coming-soon-spark coming-soon-spark-2"></span>
            <span class="coming-soon-spark coming-soon-spark-3"></span>
            <div class="coming-soon-core">
              <strong>Coming Soon</strong>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer site-shell">
      <div class="footer-mark" aria-label="SPACE copyright">
        <svg class="footer-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4.5 8.5h4l1.3-2h4.4l1.3 2h4a1.5 1.5 0 0 1 1.5 1.5v7a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 17V10a1.5 1.5 0 0 1 1.5-1.5Z" />
          <circle cx="12" cy="13.5" r="3.2" />
        </svg>
        <p class="footer-copy">&copy; 2026 SPACE</p>
      </div>
    </footer>

    <div class="lightbox" id="lightbox" hidden>
      <button class="lightbox-close" id="lightbox-close" type="button" aria-label="Close image view">
        Close
      </button>
      <div class="lightbox-card">
        <div class="lightbox-media-shell" id="lightbox-media-shell">
          <button class="lightbox-nav lightbox-nav-prev" id="lightbox-prev" type="button" aria-label="Previous image">
            <svg class="lightbox-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m14.5 5-7 7 7 7" />
            </svg>
            <span class="sr-only">Previous image</span>
          </button>
          <img id="lightbox-image" alt="" />
          <button class="lightbox-nav lightbox-nav-next" id="lightbox-next" type="button" aria-label="Next image">
            <svg class="lightbox-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m9.5 5 7 7-7 7" />
            </svg>
            <span class="sr-only">Next image</span>
          </button>
          <span class="lightbox-counter" id="lightbox-counter"></span>
        </div>
        <div class="lightbox-meta">
          <p class="section-kicker" id="lightbox-date"></p>
          <h3 id="lightbox-title"></h3>
          <div class="gallery-actions lightbox-actions" id="lightbox-actions"></div>
          <p id="lightbox-description"></p>
        </div>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
</html>
