services:
  - type: web
    name: spacegarden
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 20
      - key: STORAGE_DIR
        value: /opt/render/project/src/storage
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: media
      mountPath: /opt/render/project/src/storage
      sizeGB: 10
