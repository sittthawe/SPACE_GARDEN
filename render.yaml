services:
  - type: web
    name: spacegarden
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: NODE_VERSION
        value: 20
      - key: STORAGE_DIR
        value: /opt/render/project/src/storage
      - key: ADMIN_PASSWORD
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ALBUM_KEY
        value: album.json
      - key: R2_UPLOAD_PREFIX
        value: uploads
    disk:
      name: storage
      mountPath: /opt/render/project/src/storage
